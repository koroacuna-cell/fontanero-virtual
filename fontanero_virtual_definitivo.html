<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quirós</title>
<style>
body { font-family: Arial, sans-serif; background: #f2f2f2; margin:0; padding:0; }
#chat-container { max-width: 500px; margin: 30px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); padding:10px; display:flex; flex-direction: column; height: 80vh; }
#messages { flex:1; overflow-y:auto; padding:5px; }
.message { margin:5px 0; padding:8px 12px; border-radius:20px; max-width:80%; }
.user { background:#dcf8c6; align-self:flex-end; }
.bot { background:#ececec; align-self:flex-start; }
#input-container { display:flex; margin-top:5px; }
#input { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
button { margin-left:5px; padding:10px 15px; border:none; border-radius:20px; background:#34b7f1; color:white; cursor:pointer; }
button:hover { background:#0b93f6; }
</style>
</head>
<body>
<div id="chat-container">
<div id="messages">
<div class="bot">Hola, soy el Fontanero Virtual Eduardo Quirós.<br>Hi, I am the Virtual Plumber Eduardo Quirós.</div>
</div>
<div id="input-container">
<input id="input" type="text" placeholder="Escribe tu consulta... / Type your query...">
<button onclick="sendMessage()">Enviar / Send</button>
<button onclick="window.open('https://wa.me/34603398960','_blank')">WhatsApp</button>
<button onclick="window.open('tel:+34603398960','_blank')">Llamar / Call</button>
</div>
</div>

<script>
const messages = document.getElementById('messages');

const motorResponses = {
"termo electrico": "Puedes ver modelos y precios aquí:<br><a href='https://fontaneriaeduardoquiroz.webador.es/' target='_blank'>Fontanería Eduardo Quirós</a><br>You can check models and prices here:<br><a href='https://fontaneriaeduardoquiroz.webador.es/' target='_blank'>Fontanería Eduardo Quirós</a>",
"grifo pierde agua": "Cierra la llave de paso inmediatamente y envíame foto por WhatsApp.<br>Turn off the water immediately and send me a photo via WhatsApp.",
"fuga": "Descríbeme mejor la fuga o envíame foto por WhatsApp.<br>Describe the leak better or send a photo via WhatsApp.",
"fontanero urgente": "Descríbeme mejor el problema o envíame foto por WhatsApp.<br>Describe the issue better or send a photo via WhatsApp.",
"default": "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.<br>I didn't understand the query. Send me a photo via WhatsApp and I will help you immediately."
};

function appendMessage(text, className){
    const div = document.createElement('div');
    div.className = 'message '+className;
    div.innerHTML = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function sendMessage(){
    const input = document.getElementById('input');
    const text = input.value.trim();
    if(text==="") return;
    appendMessage(text,'user');
    input.value='';
    let response = motorResponses[text.toLowerCase()] || motorResponses['default'];
    setTimeout(()=>{ appendMessage(response,'bot'); }, 500);
}
</script>
</body>
</html>
