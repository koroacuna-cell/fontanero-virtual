<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quiroz</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin:0;
    padding:0;
}
#chat-container {
    max-width: 500px;
    margin: 30px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    padding:10px;
    display:flex;
    flex-direction: column;
    height: 80vh;
}
#messages {
    flex:1;
    overflow-y:auto;
    padding:5px;
}
.message {
    margin:5px 0;
    padding:8px 12px;
    border-radius:20px;
    max-width:80%;
}
.user { background:#dcf8c6; align-self:flex-end; }
.bot { background:#ececec; align-self:flex-start; }
#input-container { display:flex; margin-top:5px; }
#input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}
#send-btn { margin-left:5px; padding:10px 15px; border:none; border-radius:20px; background:#0084ff; color:#fff; cursor:pointer; }
#whatsapp-btn { background:#25D366; }
#call-btn { background:#007bff; margin-left:5px; }
</style>
</head>
<body>
<div id="chat-container">
    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Escribe tu consulta... / Type your query...">
        <button id="send-btn">Enviar / Send</button>
    </div>
    <div style="margin-top:10px;">
        <button id="whatsapp-btn">WhatsApp</button>
        <button id="call-btn">Llamar / Call</button>
    </div>
</div>

<script>
// Aquí se integran motores y respuestas
const motores = {
    "quiero un termo 50 lt": "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.|I didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.",
    "grifo gotea": "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.|I didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.",
    "termo pierde agua": "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.|I didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.",
};

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const whatsappBtn = document.getElementById('whatsapp-btn');
const callBtn = document.getElementById('call-btn');

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = 'message ' + type;
    div.innerText = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

sendBtn.onclick = function() {
    const query = inputEl.value.trim().toLowerCase();
    if(!query) return;
    addMessage(inputEl.value, 'user');
    inputEl.value = '';
    if(motores[query]) {
        const [es, en] = motores[query].split('|');
        addMessage(es, 'bot');
        addMessage(en, 'bot');
    } else {
        addMessage("No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.", 'bot');
        addMessage("I didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.", 'bot');
    }
}

// Enlaces funcionales
whatsappBtn.onclick = function() { window.open('https://wa.me/34600000000','_blank'); }
callBtn.onclick = function() { window.open('tel:+34600000000','_blank'); }

</script>
</body>
</html>
