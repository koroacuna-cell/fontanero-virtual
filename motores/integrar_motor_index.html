<!-- Bloque de integración del Motor Fontanero Virtual -->
<script src="motores/verificar_v4.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('input');
    const enviarBtn = document.getElementById('enviar-btn');

    function agregarMensajeUsuario(texto){
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.classList.add('user');
        div.textContent = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function agregarMensajeBot(texto){
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.classList.add('bot');
        div.innerHTML = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    enviarBtn.addEventListener('click', () => {
        const texto = input.value.trim();
        if(!texto) return;
        agregarMensajeUsuario(texto);
        input.value = '';

        // Procesa la consulta con el motor
        const procesado = window.motorFontanero.procesarConsulta(texto);
        if(!procesado){
            agregarMensajeBot(window.motorFontanero.idioma === 'es' ? 
                'No he entendido la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.' : 
                'I didn\'t understand the query. Send me a photo via WhatsApp and I will help you immediately.');
        }
    });

    // Permite pulsar Enter para enviar
    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter'){
            e.preventDefault();
            enviarBtn.click();
        }
    });
});
</script>
<style>
/* Ajuste del input y botón para móvil */
#input-container { display:flex; margin-top:5px; }
#input { flex:1; padding:12px; font-size:1.1em; border-radius:20px; border:1px solid #ccc; }
#enviar-btn { padding:12px 20px; margin-left:5px; border:none; border-radius:20px; background:#25d366; color:#fff; font-weight:bold; cursor:pointer; }
#enviar-btn:hover { background:#1ebe5d; }
</style>
