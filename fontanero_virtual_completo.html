<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quiróz</title>
<style>
body { font-family: Arial, sans-serif; background:#f0f0f0; margin:0; padding:0; }
.container { max-width: 500px; margin: auto; background:#fff; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); padding:10px; display:flex; flex-direction:column; height:90vh; }
.chat { flex:1; overflow-y:auto; padding:10px; }
.message { margin:5px 0; padding:8px 12px; border-radius:20px; max-width:80%; }
.user { background:#DCF8C6; align-self:flex-end; }
.bot { background:#eee; align-self:flex-start; }
.input-area { display:flex; padding:10px; gap:5px; }
input[type="text"] { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; }
button { padding:10px 15px; border:none; border-radius:20px; cursor:pointer; background:#25D366; color:#fff; }
.button-call { background:#34B7F1; }
a { color:#25D366; text-decoration:none; }
</style>
</head>
<body>
<div class="container">
<div class="chat" id="chat">
<div class="bot message">Haz tu pregunta al Fontanero Virtual Eduardo Quiróz / Ask your question to Virtual Plumber Eduardo Quiróz</div>
</div>
<div class="input-area">
<input type="text" id="userInput" placeholder="Escribe tu consulta... / Type your question...">
<button onclick="sendMessage()">Enviar</button>
</div>
<div style="display:flex; justify-content:space-around; padding:10px;">
<a class="button-whatsapp" href="https://wa.me/34603398960" target="_blank"><button>WhatsApp</button></a>
<a class="button-call" href="tel:+34603398960"><button>Llamar</button></a>
</div>
</div>
<script>
const chat = document.getElementById('chat');

const termos = [
  {nombre:"SIMAT 50L", precio:"195€", uso:"1-2 personas", detalles:"1200W, resistencia sumergida"},
  {nombre:"SIMAT 80L", precio:"260€", uso:"familias pequeñas/medianas", detalles:"1200W, resistencia sumergida"},
  {nombre:"SIMAT 100L", precio:"320€", uso:"familias medianas/grandes", detalles:"1200W, resistencia sumergida"},
  {nombre:"PRO R 50L", precio:"260€", uso:"1-2 personas", detalles:"1500W, resistencia blindada"},
  {nombre:"PRO R 80L", precio:"290€", uso:"familias pequeñas/medianas", detalles:"1500W, resistencia blindada"},
  {nombre:"PRO R 100L", precio:"340€", uso:"familias medianas/grandes", detalles:"1500W, resistencia blindada"},
  {nombre:"LYDOS ECO 50L", precio:"280€", uso:"1-2 personas", detalles:"1500W, resistencia blindada"},
  {nombre:"LYDOS ECO 80L", precio:"330€", uso:"familias pequeñas/medianas", detalles:"1500W, resistencia blindada"},
  {nombre:"LYDOS ECO 100L", precio:"390€", uso:"familias medianas/grandes", detalles:"1500W, resistencia blindada"}
];

function appendMessage(text, sender) {
  const div = document.createElement('div');
  div.className = sender + " message";
  div.innerHTML = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if(!text) return;
  appendMessage(text, 'user');
  input.value = '';
  
  // lógica básica de respuestas
  let respuesta = '';
  const lowerText = text.toLowerCase();
  if(lowerText.includes('termo')) {
    respuesta = 'Puedes ver modelos y precios aquí: <a href="https://fontaneriaeduardoquiroz.webador.es/" target="_blank">Fontanería Eduardo Quiróz</a>';
  } else if(lowerText.includes('grifo') || lowerText.includes('fuga')) {
    respuesta = 'Cierra la llave de paso inmediatamente y envíame una foto por WhatsApp para valorar reparación.';
  } else if(lowerText.includes('urgente')) {
    respuesta = 'Descríbeme mejor el problema y envíame una foto por WhatsApp.';
  } else {
    respuesta = 'No he encontrado esa información. Envíame una foto por WhatsApp para ayudarte mejor.';
  }

  appendMessage(respuesta, 'bot');
}
</script>
</body>
</html>
