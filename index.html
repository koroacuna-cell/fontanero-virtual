<h1>Bienvenido al Fontanero Virtual / Welcome to Virtual Plumber</h1>

<div id="fontanero-virtual-container">
  <div id="messages"></div>
  <div id="input-container">
    <input type="text" id="input" placeholder="Describe tu problema... / Describe your problem...">
    <button id="enviar-btn">Enviar / Send</button>
  </div>
</div>

<!-- Motor JS -->
<script src="motores/integrar_motor.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    // Configurar idioma: 'es' o 'en'
    window.motorFontanero.idioma = 'es'; // cambiar a 'en' para inglés

    fetch('recomendaciones.json').then(r => r.json()).then(data => window.recomendaciones = data);
    fetch('maestro_vendedor.json').then(r => r.json()).then(data => window.maestroVendedor = data);

    const input = document.getElementById('input');
    const enviarBtn = document.getElementById('enviar-btn');
    const container = document.getElementById('messages');

    function agregarMensajeUsuario(texto){
        const div = document.createElement('div');
        div.classList.add('user');
        div.textContent = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function agregarMensajeBot(texto){
        const div = document.createElement('div');
        div.classList.add('bot');
        div.innerHTML = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    enviarBtn.addEventListener('click', () => {
        const texto = input.value.trim();
        if(!texto) return;
        agregarMensajeUsuario(texto);
        input.value = '';
        const procesado = window.motorFontanero.procesarConsulta(texto);
        if(!procesado){
            agregarMensajeBot(window.motorFontanero.idioma === 'es' ?
                'No he entendido la consulta. Envíame una foto por WhatsApp.' :
                'I didn\'t understand the query. Send me a photo via WhatsApp.');
        }
    });

    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter'){ e.preventDefault(); enviarBtn.click(); }
    });
});
</script>

<style>
#input-container { display:flex; margin-top:5px; }
#input { flex:1; padding:12px; font-size:1.1em; border-radius:20px; border:1px solid #ccc; }
#enviar-btn { padding:12px 20px; margin-left:5px; border:none; border-radius:20px; background:#25d366; color:#fff; font-weight:bold; cursor:pointer; }
#enviar-btn:hover { background:#1ebe5d; }
.user { margin:5px; text-align:right; font-weight:bold; }
.bot { margin:5px; text-align:left; }
</style>
