<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quiroz</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin:0;
    padding:0;
}
#chat-container {
    max-width: 500px;
    margin: 30px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    padding:10px;
    display:flex;
    flex-direction: column;
    height: 80vh;
}
#messages {
    flex:1;
    overflow-y:auto;
    padding:5px;
}
.message {
    margin:5px 0;
    padding:8px 12px;
    border-radius:20px;
    max-width:80%;
}
.user {
    background:#dcf8c6;
    align-self:flex-end;
}
.bot {
    background:#ececec;
    align-self:flex-start;
}
#input-container {
    display:flex;
    margin-top:5px;
}
#input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}
button {
    padding:10px 15px;
    border:none;
    border-radius:20px;
    margin-left:5px;
    cursor:pointer;
}
#send { background:#34b7f1; color:#fff; }
#whatsapp { background:#25d366; color:#fff; }
#call { background:#007bff; color:#fff; }
</style>
</head>
<body>
<div id="chat-container">
    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Escribe tu consulta... / Type your query...">
        <button id="send">Enviar / Send</button>
        <button id="whatsapp" onclick="window.open('https://wa.me/34603398960','_blank')">WhatsApp</button>
        <button id="call" onclick="window.location.href='tel:+34603398960'">Llamar / Call</button>
    </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

function addMessage(text, cls){
    const div = document.createElement('div');
    div.className = 'message ' + cls;
    div.innerText = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function enviarPregunta(pregunta){
    addMessage(pregunta, 'user');
    try {
        const response = await fetch('motores/verificar_v3.py?query=' + encodeURIComponent(pregunta));
        const data = await response.text();
        addMessage(data || 'No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.\nI didn\'t understand the query. Send me a photo via WhatsApp and I will help you immediately.', 'bot');
    } catch (e){
        addMessage('Error al contactar con el motor. Intenta más tarde.', 'bot');
    }
}

sendBtn.addEventListener('click', () => {
    const q = inputEl.value.trim();
    if(q) {
        enviarPregunta(q);
        inputEl.value = '';
    }
});

inputEl.addEventListener('keypress', (e) => {
    if(e.key === 'Enter'){
        sendBtn.click();
    }
});
</script>
</body>
</html>
