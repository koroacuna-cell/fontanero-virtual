<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quiroz</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin:0;
    padding:0;
}
#chat-container {
    max-width: 500px;
    margin: 30px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    padding:10px;
    display:flex;
    flex-direction: column;
    height: 80vh;
}
#messages {
    flex:1;
    overflow-y:auto;
    padding:5px;
}
.message {
    margin:5px 0;
    padding:8px 12px;
    border-radius:20px;
    max-width:80%;
}
.user { background:#dcf8c6; align-self:flex-end; }
.bot { background:#ececec; align-self:flex-start; }
#input-container {
    display:flex;
    margin-top:5px;
}
#input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
}
.action-buttons {
    display:flex;
    justify-content:space-around;
    margin-top:10px;
}
.action-buttons a {
    padding:10px 20px;
    border-radius:20px;
    color:white;
    text-decoration:none;
    font-weight:bold;
    text-align:center;
    flex:1;
    margin:0 5px;
}
.action-buttons a.whatsapp { background:#25D366; }
.action-buttons a.call { background:#34B7F1; }
</style>
</head>
<body>
<div id="chat-container">
    <div id="messages">
        <div class="bot">Hola, soy el Fontanero Virtual Eduardo Quiroz.<br>Hi, I am the Virtual Plumber Eduardo Quiroz.</div>
    </div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Escribe tu consulta... / Type your query...">
        <button id="send">Enviar / Send</button>
    </div>
    <div class="action-buttons">
        <a class="whatsapp" href="https://wa.me/34603398960" target="_blank">WhatsApp</a>
        <a class="call" href="tel:+34603398960">Llamar / Call</a>
    </div>
</div>

<script>
// Aquí se vincularán los motores y el backend para procesar preguntas/respuestas
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const messages = document.getElementById('messages');

sendBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if (!text) return;
    const userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.textContent = text;
    messages.appendChild(userMsg);

    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.textContent = "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.\nI didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.";
    messages.appendChild(botMsg);

    messages.scrollTop = messages.scrollHeight;
    input.value = '';
});
</script>
</body>
</html>
