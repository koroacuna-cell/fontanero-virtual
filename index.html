<h1>Bienvenido al Fontanero Virtual</h1>

<div id="fontanero-virtual-container"></div>

<!-- Cargar motores JS reales -->
<script src="motores/verificar_v4.js"></script>
<script src="motores/motor_vendedor.js"></script>

<!-- Cargar JSON -->
<script>
Promise.all([
fetch('recomendaciones.json').then(r=>r.json()),
fetch('maestro_vendedor.json').then(r=>r.json())
]).then(([rec, maestro])=>{
window.recomendaciones = rec;
window.maestroVendedor = maestro;
console.log("JSON cargados correctamente");
});
</script>

<!-- Cargar integración HTML correctamente -->
<script>
fetch('motores/integrar_motor_index.html')
.then(r=>r.text())
.then(html=>{
document.getElementById('fontanero-virtual-container').innerHTML = html;
console.log("Interfaz cargada correctamente");
})
.catch(e=>console.error("Error cargando integración:",e));
</script>
