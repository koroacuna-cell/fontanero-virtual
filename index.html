<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quiroz</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 0;
    padding: 0;
}
#chat-container {
    max-width: 500px;
    margin: 20px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    padding: 10px;
    display: flex;
    flex-direction: column;
    height: 80vh;
}
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 5px;
}
.message {
    margin: 5px 0;
    padding: 8px 12px;
    border-radius: 20px;
    max-width: 80%;
    word-wrap: break-word;
}
.user { background: #dcf8c6; align-self: flex-end; }
.bot { background: #ececec; align-self: flex-start; }
#input-container {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 5px;
}
#input { 
    flex: 1; 
    padding: 10px; 
    border-radius: 20px; 
    border: 1px solid #ccc; 
    min-width: 0;
}
.button {
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
}
#whatsapp-btn { background: #25d366; }
#call-btn { background: #0084ff; }
</style>
</head>
<body>
<div id="chat-container">
    <div id="messages"></div>
    <div id="input-container">
        <input type="text" id="input" placeholder="Escribe tu consulta... / Type your query...">
        <button id="send-btn" class="button">Enviar / Send</button>
        <button id="whatsapp-btn" class="button">WhatsApp</button>
        <button id="call-btn" class="button">Llamar / Call</button>
    </div>
</div>
<script>
window.addEventListener('DOMContentLoaded', () => {
    const messages = document.getElementById('messages');
    if(messages) {
        const botMsg = document.createElement('div');
        botMsg.className = 'bot';
        botMsg.textContent = 'Hola, soy el Fontanero Virtual Eduardo Quiroz.\nHi, I am the Virtual Plumber Eduardo Quiroz.';
        messages.appendChild(botMsg);
        messages.scrollTop = messages.scrollHeight;
    }

    const sendBtn = document.getElementById('send-btn');
    const input = document.getElementById('input');

    sendBtn.addEventListener('click', () => {
        if(input.value.trim() !== '') {
            const userMsg = document.createElement('div');
            userMsg.className = 'user';
            userMsg.textContent = input.value;
            messages.appendChild(userMsg);

            const botMsg = document.createElement('div');
            botMsg.className = 'bot';
            botMsg.textContent = "No he entendido bien la consulta. Envíame una foto por WhatsApp y te ayudo inmediatamente.\nI didn't understand the query. Send me a photo via WhatsApp and I will help you immediately.";
            messages.appendChild(botMsg);

            input.value = '';
            messages.scrollTop = messages.scrollHeight;
        }
    });
});
</script>
</body>
</html>
