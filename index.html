<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontanero Virtual Eduardo Quirós</title>

<style>
body{
margin:0;
font-family:Arial;
background:#e5ddd5;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#075E54;
color:white;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
}

.msg{
max-width:75%;
padding:10px;
border-radius:10px;
margin:5px 0;
font-size:14px;
white-space:pre-line;
}

.msg a{
color:#0645AD;
font-weight:bold;
text-decoration:underline;
}

.user{
align-self:flex-end;
background:#DCF8C6;
}

.bot{
align-self:flex-start;
background:white;
}

footer{
display:flex;
padding:10px;
background:#f0f0f0;
}

input{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

button{
margin-left:5px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#25D366;
color:white;
cursor:pointer;
}

.contact{
display:flex;
justify-content:space-around;
background:#fff;
padding:10px;
border-top:1px solid #ddd;
}

.contact a{
text-decoration:none;
padding:8px 12px;
border-radius:20px;
color:white;
font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#007bff;}
</style>
</head>

<body>

<header>
Haz tu pregunta al Fontanero Virtual Eduardo Quirós
</header>

<div id="chat"></div>

<footer>
<input type="text" id="input" placeholder="Escribe tu consulta...">
<button onclick="enviar()">Enviar</button>
</footer>

<div class="contact">
<a class="whatsapp" href="https://wa.me/34603398960" target="_blank">WhatsApp</a>
<a class="call" href="tel:+34603398960">Llamar</a>
</div>

<script>

const paginaWeb = "https://fontaneriaeduardoquiroz.webador.es/";

function normalizar(texto){
return texto
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g, "");
}

function enviar(){
let original = document.getElementById("input").value.trim();
if(original==="") return;

let texto = normalizar(original);

addMsg(original,"user");

let enlaceHTML = `<a href="${paginaWeb}" target="_blank">Visitar página oficial de Fontanería Eduardo Quirós</a>`;

let respuesta = null;

// PRECIO TERMO 50L
if((texto.includes("precio") || texto.includes("vale")) && texto.includes("50")){
respuesta = `Un termo eléctrico de 50 litros instalado puede rondar entre 195€ y 280€.\n\n${enlaceHTML}`;
}

// INSTALAR TERMO
if(texto.includes("instalar termo") || texto.includes("cambiar termo")){
respuesta = `Instalo termos eléctricos nuevos en Torrevieja.\n\n${enlaceHTML}`;
}

// TERMO AVERÍA
if(texto.includes("termo") &&
(texto.includes("pierde") || texto.includes("roto") || texto.includes("no calienta"))){
respuesta = "1️⃣ Corta la corriente.\n2️⃣ Cierra la llave de paso.\n\nEnvíame foto por WhatsApp para presupuesto.";
}

// GRIFO
if(texto.includes("grifo") || texto.includes("gotea")){
respuesta = "Cierra la llave de paso.\nPuede ser junta o cartucho.\nEnvíame foto por WhatsApp.";
}

// RESPUESTA GENERAL
if(!respuesta){
respuesta = `Descríbeme mejor el problema.\n\n${enlaceHTML}`;
}

addMsg(respuesta,"bot");
document.getElementById("input").value="";
}

function addMsg(texto,clase){
let div=document.createElement("div");
div.className="msg "+clase;

if(clase==="bot"){
div.innerHTML=texto;  // IMPORTANTE PARA QUE EL ENLACE SEA CLICABLE
}else{
div.innerText=texto;
}

document.getElementById("chat").appendChild(div);
document.getElementById("chat").scrollTop=document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>
