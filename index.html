<h1>Bienvenido al Fontanero Virtual - Prueba</h1>

<div id="fontanero-virtual-container">
  <!-- Contenedor del motor virtual -->
</div>

<!-- Scripts del motor -->
<script src="motores/verificar_v4.js"></script>
<script src="motores/motor_vendedor.js"></script>
<script src="motores/integrar_motor_index.html"></script>

<script>
console.log("Cargando datos del motor...");
fetch('recomendaciones.json')
  .then(r => r.json())
  .then(data => {
    window.recomendaciones = data;
    console.log("Recomendaciones cargadas:", data);
  })
  .catch(e => console.error("Error cargando recomendaciones:", e));

fetch('maestro_vendedor.json')
  .then(r => r.json())
  .then(data => {
    window.maestroVendedor = data;
    console.log("Maestro vendedor cargado:", data);
  })
  .catch(e => console.error("Error cargando maestro vendedor:", e));
</script>

<script>
console.log("Inicializando motor...");
if(window.recomendaciones && window.maestroVendedor) {
    console.log("Motor listo para funcionar.");
} else {
    console.log("Esperando datos del motor...");
}
</script>
